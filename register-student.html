<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration | Ride The Wind</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏄</text></svg>">
</head>
<body>
  
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <span style="font-size: 1.8rem;">🏄</span> Ride The Wind
      </a>
      <div class="d-flex align-items-center ms-auto gap-3">
        <button class="theme-toggle" id="rtlToggle" aria-label="Toggle RTL">RTL</button>
        <button class="theme-toggle" id="themeToggle"><span id="themeIcon">🌙</span></button>
        <a href="index.html" class="btn btn-outline-primary">← Back to Home</a>
      </div>
    </div>
  </nav>

  <section class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-lg border-0 p-4">
            <div class="text-center mb-4">
              <a href="index.html" style="text-decoration: none; display: inline-block; margin-bottom: 1rem;">
                <span style="font-size: 3rem;">🏄</span>
              </a>
              <h2 class="fw-bold fs-3 mb-2">Join the Ride The Wind Family</h2>
              <p class="text-muted mb-4">Create your student account to book lessons and track progress.</p>
            </div>

            <div class="d-flex flex-column gap-3 mb-4">
              <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 py-2" style="color: #333; border-color: #ddd; background-color: #fff;">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" style="width: 20px;">
                Sign up with Google
              </button>
              <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 py-2" style="color: #333; border-color: #ddd; background-color: #fff;">
                <img src="https://www.svgrepo.com/show/475647/facebook-color.svg" alt="Facebook" style="width: 20px;">
                Sign up with Facebook
              </button>
            </div>
            
            <div class="position-relative mb-4 text-center">
              <hr class="text-muted" style="opacity: 0.2;">
              <span class="position-absolute top-50 start-50 translate-middle px-3 text-muted" style="background-color: var(--bg-primary); font-size: 0.85rem;">or sign up with email</span>
            </div>

            <form id="studentRegisterForm">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="John Doe" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="student@example.com" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
            </form>

            <div class="text-center mt-4">
              <p class="text-muted">Already have an account? <a href="login.html" class="text-primary text-decoration-none">Login Here</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    // Mock Register Logic
    document.getElementById('studentRegisterForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // Simulate Successful Registration
      localStorage.setItem('userRole', 'student');
      alert('Registration Successful! Redirecting to Dashboard...');
      window.location.href = 'dashboard/student/index.html';
    });
  </script>
</body>
</html>
